<!DOCTYPE html>
<html lang="en">
<head>

<title> Philosophy & Logic Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh;padding:2rem 1rem}
.container{max-width:720px;margin:0 auto}
.brand{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#aaa;margin-bottom:12px}
h1{font-size:28px;font-weight:500;margin-bottom:6px}
.tagline{font-size:15px;color:#888;margin-bottom:2.5rem}
.section-label{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.8px;color:#aaa;margin-bottom:10px}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:2rem}
.cat-card{padding:14px 16px;border-radius:10px;border:1.5px solid #e0e0e0;cursor:pointer;background:#fff;transition:all .15s;text-align:left}
.cat-card:hover{border-color:#bbb}
.cat-card.selected{border-color:#1a6ef5;background:#f0f5ff}
.cat-card .cn{font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:2px}
.cat-card .cc{font-size:12px;color:#aaa}
.cat-card.selected .cn{color:#1a6ef5}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:2rem}
.mode-card{padding:14px 16px;border-radius:10px;border:1.5px solid #e0e0e0;cursor:pointer;background:#fff;transition:all .15s;text-align:left}
.mode-card:hover{border-color:#bbb}
.mode-card.selected{border-color:#1a6ef5;background:#f0f5ff}
.mode-card .mn{font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:3px}
.mode-card.selected .mn{color:#1a6ef5}
.mode-card .md{font-size:12px;color:#aaa;line-height:1.4}

/* Q COUNT SELECTOR */
.qcount-row{display:flex;align-items:center;gap:10px;margin-bottom:2rem;flex-wrap:wrap}
.qcount-btn{padding:8px 18px;border-radius:20px;border:1.5px solid #e0e0e0;cursor:pointer;font-size:14px;font-weight:500;background:#fff;color:#888;transition:all .15s}
.qcount-btn:hover{border-color:#bbb;color:#1a1a1a}
.qcount-btn.selected{border-color:#1a6ef5;background:#f0f5ff;color:#1a6ef5}
.qcount-custom{display:flex;align-items:center;gap:8px;flex:1;min-width:160px}
.qcount-custom input{width:80px;padding:8px 12px;border-radius:20px;border:1.5px solid #e0e0e0;font-size:14px;font-weight:500;color:#1a1a1a;background:#fff;text-align:center;outline:none}
.qcount-custom input:focus{border-color:#1a6ef5}
.qcount-custom input.selected-input{border-color:#1a6ef5;background:#f0f5ff;color:#1a6ef5}
.qcount-max{font-size:12px;color:#bbb}

.start-btn{width:100%;padding:14px;border-radius:10px;border:none;background:#1a6ef5;color:#fff;font-size:15px;font-weight:500;cursor:pointer;transition:background .15s}
.start-btn:hover{background:#1560d8}
.start-btn:disabled{background:#ccc;cursor:default}

/* QUIZ */
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:8px;flex-wrap:wrap}
.timer{font-size:14px;font-weight:500;color:#1a1a1a;background:#fff;border:1px solid #e8e8e8;border-radius:20px;padding:5px 14px;display:flex;align-items:center;gap:6px}
.tdot{width:7px;height:7px;border-radius:50%;background:#1a6ef5;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.score-badge{font-size:13px;font-weight:500;padding:5px 14px;border-radius:20px;background:#e8f4e8;color:#2a7a2a}
.progress-bar{height:4px;background:#e0e0e0;border-radius:2px;margin-bottom:1.25rem;overflow:hidden}
.progress-fill{height:100%;background:#1a6ef5;border-radius:2px;transition:width .3s}
.question-card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-cat{font-size:11px;color:#bbb;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.q-text{font-size:15px;font-weight:500;line-height:1.55;margin-bottom:1rem}
.options{display:flex;flex-direction:column;gap:8px}
.opt{padding:10px 14px;border-radius:8px;border:1px solid #e8e8e8;cursor:pointer;font-size:14px;color:#1a1a1a;background:#fafafa;transition:all .15s;text-align:left;line-height:1.4;width:100%}
.opt:hover:not(.disabled){background:#fff;border-color:#bbb}
.opt.pending{background:#eef3ff;border-color:#1a6ef5}
.opt.correct{background:#e8f4e8;border-color:#5ab85a;color:#1a5a1a}
.opt.wrong{background:#fde8e8;border-color:#e05a5a;color:#5a1a1a}
.opt.disabled{cursor:default}
.feedback{margin-top:10px;padding:8px 12px;border-radius:8px;font-size:13px;line-height:1.5}
.feedback.correct{background:#e8f4e8;color:#1a5a1a}
.feedback.wrong{background:#fde8e8;color:#5a1a1a}
.feedback.pending{background:#eef3ff;color:#1a4ab5}
.nav-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.btn{padding:8px 18px;border-radius:8px;border:1px solid #ddd;cursor:pointer;font-size:14px;background:#fff;color:#1a1a1a;transition:all .15s}
.btn:hover{background:#f5f5f5}
.btn.primary{background:#1a6ef5;color:#fff;border-color:transparent}
.btn.primary:hover{background:#1560d8}
.btn:disabled{opacity:.35;cursor:default}
.btn.ghost{border-color:transparent;color:#bbb}
.btn.ghost:hover{color:#888;background:transparent}
.meta-bar{font-size:13px;color:#aaa;margin-bottom:8px}

/* RESULTS */
.results{text-align:center;padding:2rem 1rem}
.big-score{font-size:58px;font-weight:500;line-height:1;margin-bottom:6px}
.sub{font-size:15px;color:#888;margin-bottom:4px}
.time-taken{font-size:13px;color:#aaa;margin-bottom:1.5rem}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.stat{background:#f5f4f0;border-radius:8px;padding:1rem}
.stat-n{font-size:24px;font-weight:500}
.stat-l{font-size:12px;color:#888;margin-top:2px}
.rbtns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}

/* REVIEW */
.review-card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1.25rem;margin-bottom:10px}
</style>
</head>

  {cat:"Logic & Arguments",q:"\"If a person is a doctor, they have a medical degree. John has a medical degree. Therefore, John is a doctor.\" This argument is:",opts:["Sound","Valid but unsound","Invalid","Sound if John practices medicine"],a:2},

  {cat:"Logic & Arguments",q:"\"Only mammals have fur. A dolphin is a mammal. Therefore, a dolphin has fur.\" This argument is:",opts:["Valid and sound","Valid but unsound","Invalid","Neither"],a:2},
  {cat:"Logic & Arguments",q:"\"If you exercise regularly, you will be healthy. You exercise regularly. Therefore, you are healthy.\" This argument is:",opts:["Valid and sound","Valid but unsound","Invalid","Sound only if no other factors affect health"],a:1},
  {cat:"Logic & Arguments",q:"\"All fish can fly. Goldie is a fish. Therefore, Goldie can fly.\" Which premise is problematic?",opts:["\"All fish can fly\"","\"Goldie is a fish\"","\"Goldie can fly\"","None of the above"],a:0},
  {cat:"Logic & Arguments",q:"\"All fruits are sweet. Lemons are fruits. Therefore, lemons are sweet.\" Which premise is problematic?",opts:["\"All fruits are sweet\"","\"Lemons are fruits\"","\"Lemons are sweet\"","None of the above"],a:0},
  {cat:"Logic & Arguments",q:"\"All vehicles have four wheels. My motorcycle is a vehicle.\" Which premise is untrue?",opts:["\"All vehicles have four wheels\"","\"My motorcycle is a vehicle\"","\"My motorcycle has four wheels\"","None of the above"],a:0},
  {cat:"Logic & Arguments",q:"\"If a person is a millionaire, then they are happy.\" Which premise is likely questionable?",opts:["\"If a person is a millionaire, then they are happy\"","\"John is not happy\"","\"John is not a millionaire\"","All premises are equally true"],a:0},
  {cat:"Logic & Arguments",q:"Identify the inductive argument:",opts:["If it rains, the ground gets wet. It rained. Therefore, the ground is wet.","All squares have four sides. A rectangle is a square. Therefore, a rectangle has four sides.","Most dogs bark when they see strangers. My neighbor's dog is barking. Therefore, it probably sees a stranger.","If an animal is a bird, it must lay eggs. A parrot is a bird. Therefore, it lays eggs."],a:2},
  {cat:"Logic & Arguments",q:"Which argument is deductive?",opts:["The last five times I drank coffee, I felt more awake. Therefore, drinking coffee always makes people more awake.","Every prime number greater than 2 is odd. 13 is a prime number greater than 2. Therefore, 13 is odd.","All swans I've seen are white. Therefore, all swans must be white.","The majority of past presidents have been male. Therefore, the next president will likely be male."],a:1},
  {cat:"Logic & Arguments",q:"What makes an argument deductive?",opts:["It draws conclusions based on probability and past experience.","It guarantees the truth of the conclusion if the premises are true.","It makes a generalization based on specific observations.","It assumes that the past will always predict the future."],a:1},
  {cat:"Logic & Arguments",q:"Which of these is an example of inductive reasoning?",opts:["All birds have feathers. A robin is a bird. Therefore, a robin has feathers.","No human can survive without oxygen. John is a human. Therefore, John needs oxygen.","My grandfather smoked and lived to 95. Therefore, smoking does not always cause early death.","If today is Tuesday, then tomorrow is Wednesday. Today is Tuesday. Therefore, tomorrow is Wednesday."],a:2},
  {cat:"Logic & Arguments",q:"A deductive argument is one in which:",opts:["The conclusion follows with certainty if the premises are true.","The conclusion is always true, even if the premises are false.","The conclusion is only probable, not certain.","The argument is based entirely on past observations."],a:0},
  {cat:"Logic & Arguments",q:"Which best represents inductive reasoning?",opts:["All men are mortal. Socrates is a man. Therefore, Socrates is mortal.","The last five times I went jogging, I felt great afterward. Therefore, jogging always makes people feel great.","If a shape is a square, then it has four equal sides. Shape X is a square. Therefore, it has four equal sides.","If a student studies, they pass the test. Mike studied. Therefore, he passed the test."],a:1},
  {cat:"Branches of Philosophy",q:"Which branch of philosophy deals with the study of knowledge—its nature, sources, and validity?",opts:["Metaphysics","Epistemology","Axiology","Logic"],a:1},
  {cat:"Branches of Philosophy",q:"Which statement best captures Descartes's view of metaphysics?",opts:["It is the study of values and moral judgments.","It is primarily concerned with linguistic analysis and the structure of arguments.","It is considered the \"first philosophy,\" dealing with the fundamental nature of reality and existence.","It is purely concerned with political structures and human relationships."],a:2},
  {cat:"Branches of Philosophy",q:"Which of the following is NOT one of the traditionally recognized major branches of philosophy?",opts:["Epistemology","Metaphysics","Axiology (Ethics and Aesthetics)","Anthropology"],a:3},
  {cat:"Branches of Philosophy",q:"In epistemology, which source of knowledge involves divine undertones and communication from God?",opts:["Authority","Revelation","Empiricism","Rationalism"],a:1},
  {cat:"Branches of Philosophy",q:"Logic is primarily concerned with which of the following?",opts:["The study of moral values and judgments","The methods and principles used in distinguishing correct from incorrect reasoning","The study of the origin, nature, and development of the universe","The study of aesthetic values in art and nature"],a:1},
  {cat:"Branches of Philosophy",q:"Axiology is subdivided mainly into:",opts:["Ethics and Metaphysics","Epistemology and Logic","Ethics and Aesthetics","Anthropology and Cosmology"],a:2},
  {cat:"Branches of Philosophy",q:"Which philosopher warned that \"If the world's ethical standards fail to rise to the advance of our technological revolution, we shall perish\"?",opts:["Aristotle","Counts (1962)","Copi (1982)","Knight (1990)"],a:1},
  {cat:"Branches of Philosophy",q:"What does the text describe as the \"king\" of all disciplines, leading to the highest degree in many fields (Ph.D.)?",opts:["Theology","Mathematics","Philosophy","Anthropology"],a:2},
  {cat:"Branches of Philosophy",q:"Which branch of philosophy studies \"the nature of reality\"?",opts:["Axiology","Metaphysics","Logic","Epistemology"],a:1},
  {cat:"Branches of Philosophy",q:"According to the text, which of the following is NOT typically a direct source of knowledge mentioned?",opts:["Rationalism (reasoning)","Empiricism (sense perception)","Tradition (passed down without questioning)","Intuition (immediate understanding without reasoning)"],a:2},
  {cat:"Branches of Philosophy",q:"Which branch of philosophy is primarily focused on the formal principles of reasoning, argument structure, and evaluation of inferences?",opts:["Metaphysics","Epistemology","Logic","Axiology"],a:2},
  {cat:"Branches of Philosophy",q:"Which sub-branch of axiology is concerned with criteria for what is considered beautiful or artistically valuable?",opts:["Ethics","Aesthetics","Metaphysics","Epistemology"],a:1},
  {cat:"Branches of Philosophy",q:"Which philosophical method, associated with Descartes, involves doubting all beliefs until reaching an undeniable foundation?",opts:["Empiricism","Induction","Methodological skepticism","Pragmatism"],a:2},
  {cat:"Branches of Philosophy",q:"\"I think, therefore I am\" is most closely associated with which philosopher?",opts:["Aristotle","René Descartes","Immanuel Kant","Socrates"],a:1},
  {cat:"Branches of Philosophy",q:"Which source of knowledge is based on direct sensory experience?",opts:["Rationalism","Empiricism","Revelation","Intuition"],a:1},
  {cat:"Branches of Philosophy",q:"Which branch of philosophy would include the study of moral dilemmas and questions about right and wrong?",opts:["Epistemology","Axiology","Metaphysics","Logic"],a:1},
  {cat:"Branches of Philosophy",q:"Which best describes the relationship between philosophy and other academic disciplines?",opts:["Philosophy is a specialized field with no connection to other disciplines.","Philosophy is the \"mother of the sciences,\" forming the foundation for various academic fields and the Ph.D. degree.","Philosophy only concerns abstract ideas with no practical application.","Philosophy primarily deals with historical analysis rather than scientific inquiry."],a:1},
  {cat:"Branches of Philosophy",q:"Which source of knowledge is associated with gaining insight without a deliberate, conscious process?",opts:["Authority","Intuition","Empiricism","Rationalism"],a:1},
  {cat:"Branches of Philosophy",q:"Which major branch of philosophy deals with questions about the nature of existence, reality, and the universe?",opts:["Epistemology","Axiology","Metaphysics","Logic"],a:2},
  {cat:"Branches of Philosophy",q:"Which branch studies cosmology, and from which major branch is it deduced?",opts:["Epistemology, deduced from Logic","Cosmology, deduced from Axiology","Cosmology, deduced from Metaphysics","Ethics, deduced from Epistemology"],a:2},
  {cat:"Branches of Philosophy",q:"Which branch deals with systematic study of valid reasoning and argument structure?",opts:["Logic; to distinguish correct from incorrect reasoning","Epistemology; to analyze the sources of knowledge","Metaphysics; to explore the nature of being","Axiology; to evaluate ethical values"],a:0},
  {cat:"Branches of Philosophy",q:"The study of moral values, ethical dilemmas, and aesthetic judgments is grouped under which branch?",opts:["Metaphysics; to understand the nature of existence","Epistemology; to question the basis of knowledge","Axiology; to assess what is valuable and good","Logic; to analyze argument structure"],a:2},
  {cat:"Branches of Philosophy",q:"Which branch is dedicated to understanding the nature, sources, and limits of human knowledge?",opts:["Epistemology; it investigates sense perception, reason, intuition, and revelation","Metaphysics; it investigates the origin of the universe","Logic; it investigates the structure of arguments","Axiology; it investigates moral and aesthetic values"],a:0},
  {cat:"Branches of Philosophy",q:"Which branch lays the groundwork for scientific inquiry and is sometimes referred to as the \"mother of the sciences\"?",opts:["Ethics","Logic","Metaphysics","Philosophy as a whole (with emphasis on Metaphysics)"],a:3},
  {cat:"Branches of Philosophy",q:"In evaluating arguments, which branch helps identify fallacies and ensure logical consistency?",opts:["Epistemology; to test the reliability of sensory data","Logic; to distinguish between valid and invalid reasoning","Metaphysics; to explain the nature of reality","Axiology; to define what is ethically right"],a:1},
  {cat:"Branches of Philosophy",q:"Which branch is directly concerned with questions about existence and being, and how does it relate to the cosmos?",opts:["Epistemology; it relates by explaining how we come to know cosmic phenomena","Axiology; it relates by judging the beauty of the cosmos","Metaphysics; it relates by addressing the fundamental principles that govern existence, including the cosmos","Logic; it relates by structuring the arguments about cosmic theories"],a:2}
];

const COUNTS={"All":QS.length,"Categorical Propositions":QS.filter(q=>q.cat==="Categorical Propositions").length,"Logic & Arguments":QS.filter(q=>q.cat==="Logic & Arguments").length,"Branches of Philosophy":QS.filter(q=>q.cat==="Branches of Philosophy").length};
const PRESETS=[10,20,30,50];

let screen="start",selCat="All",selMode="immediate",selCount=20,customCount="",useCustom=false;
let filtered=[],order=[],idx=0,score=0,answered={},secs=0,timerID=null,finalTime=0;

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function fmt(s){const m=Math.floor(s/60),r=s%60;return m>0?`${m}m ${r}s`:`${r}s`;}
function tickTimer(){secs++;const el=document.getElementById('td');if(el)el.textContent=fmt(secs);}
function startTimer(){clearInterval(timerID);secs=0;timerID=setInterval(tickTimer,1000);}
function stopTimer(){clearInterval(timerID);finalTime=secs;}

function getPool(){return selCat==="All"?[...QS]:QS.filter(q=>q.cat===selCat);}
function getMaxQ(){return getPool().length;}
function getEffectiveCount(){
  const max=getMaxQ();
  const n=useCustom?parseInt(customCount)||0:selCount;
  return Math.min(Math.max(1,n),max);
}

function startQuiz(){
  const pool=getPool();
  const n=getEffectiveCount();
  const shuffled=shuffle(pool.map((_,i)=>i)).slice(0,n);
  filtered=pool;
  order=shuffled;
  idx=0;score=0;answered={};screen="quiz";
  startTimer();render();
}

function pick(i){
  if(answered[idx]!==undefined)return;
  answered[idx]=i;
  if(i===filtered[order[idx]].a)score++;
  render();
}
function nav(d){idx=Math.max(0,Math.min(order.length-1,idx+d));render();}
function finish(){stopTimer();screen="results";render();}
function goHome(){stopTimer();screen="start";render();}
function goReview(){screen="review";render();}
function restartSame(){startQuiz();}
function selCatFn(c){selCat=c;useCustom=false;render();}
function selModeFn(m){selMode=m;render();}
function selCountFn(n){selCount=n;useCustom=false;render();}
function onCustomInput(v){
  customCount=v;
  useCustom=v.trim()!=="";
  render();
}

function render(){
  document.getElementById('app').innerHTML={start:renderStart,quiz:renderQuiz,results:renderResults,review:renderReview}[screen]();
  if(screen==="start"){
    const inp=document.getElementById('custom-input');
    if(inp){inp.value=customCount;inp.addEventListener('input',e=>onCustomInput(e.target.value));}
  }
}

function renderStart(){
  const cats=["All","Categorical Propositions","Logic & Arguments","Branches of Philosophy"];
  const max=getMaxQ();
  const effective=getEffectiveCount();
  const presetBtns=PRESETS.map(n=>{
    const capped=Math.min(n,max);
    const disabled=capped<1;
    const isSelected=!useCustom&&selCount===n;
    return`<button class="qcount-btn${isSelected?' selected':''}" onclick="selCountFn(${n})" ${disabled?'disabled':''}>${n}</button>`;
  }).join('');

  return`<div>
    <div class="brand">MCQs</div>
    <h1>Philosophy &amp; Logic Quiz</h1>
    <p class="tagline">120 questions across three topics. Configure your session below.</p>

    <div class="section-label">Select category</div>
    <div class="cat-grid">${cats.map(c=>`<div class="cat-card${selCat===c?' selected':''}" onclick="selCatFn('${c}')"><div class="cn">${c}</div><div class="cc">${COUNTS[c]} questions</div></div>`).join('')}</div>

    <div class="section-label">Number of questions</div>
    <div class="qcount-row">
      <!-- ${presetBtns} -->
      <button class="qcount-btn${!useCustom&&selCount===max?' selected':''}" onclick="selCountFn(${max})">All (${max})</button>
      <div class="qcount-custom">
        <input id="custom-input" type="number" min="1" max="${max}" placeholder="0" class="${useCustom?'selected-input':''}">
        <span class="qcount-max">max ${max}</span>
      </div>
    </div>
    <p style="font-size:13px;color:#aaa;margin-top:-12px;margin-bottom:2rem">${effective} question${effective!==1?'s':''} selected · drawn randomly from the pool</p>

    <div class="section-label">Answer mode</div>
    <div class="mode-grid">
      <div class="mode-card${selMode==='immediate'?' selected':''}" onclick="selModeFn('immediate')"><div class="mn">Immediate feedback</div><div class="md">See if you're right after each question</div></div>
      <div class="mode-card${selMode==='end'?' selected':''}" onclick="selModeFn('end')"><div class="mn">Reveal at the end</div><div class="md">All answers shown on the results screen</div></div>
    </div>

    <button class="start-btn" onclick="startQuiz()">Start ${effective} question${effective!==1?'s':''} &#8594;</button>
  </div>`;
}

function renderQuiz(){
  const q=filtered[order[idx]],total=order.length,done=Object.keys(answered).length,pct=Math.round((done/total)*100),sel=answered[idx],isAns=sel!==undefined;
  const opts=q.opts.map((o,i)=>{
    let cls='opt';
    if(isAns){cls+=' disabled';if(selMode==='immediate'){if(i===q.a)cls+=' correct';else if(i===sel&&sel!==q.a)cls+=' wrong';}else{if(i===sel)cls+=' pending';}}
    return`<button class="${cls}"${isAns?'':` onclick="pick(${i})"`}>${String.fromCharCode(65+i)}. ${o}</button>`;
  }).join('');
  let fb='';
  if(isAns&&selMode==='immediate')fb=`<div class="feedback ${sel===q.a?'correct':'wrong'}">${sel===q.a?'Correct!':'Incorrect — correct answer: '+q.opts[q.a]}</div>`;
  else if(isAns&&selMode==='end')fb=`<div class="feedback pending">Answer recorded — results revealed at the end.</div>`;
  return`<div>
    <div class="quiz-header">
      <div class="timer"><span class="tdot"></span><span id="td">${fmt(secs)}</span></div>
      <span class="score-badge">${selMode==='immediate'?score+'/'+done+' correct':'Q '+(idx+1)+' of '+total}</span>
    </div>
    <div class="meta-bar">Q${idx+1} of ${total} &nbsp;·&nbsp; ${selCat} &nbsp;·&nbsp; ${selMode==='immediate'?'Immediate feedback':'Reveal at end'}</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="question-card">
      <div class="q-cat">${q.cat}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${opts}</div>${fb}
    </div>
    <div class="nav-row">
      <button class="btn" onclick="nav(-1)"${idx===0?' disabled':''}>&#8592; Prev</button>
      <button class="btn ghost" onclick="goHome()">&#215; Quit</button>
      ${idx<total-1?`<button class="btn primary" onclick="nav(1)"${!isAns?' disabled':''}>Next &#8594;</button>`:`<button class="btn primary" onclick="finish()"${!isAns?' disabled':''}>Finish &#10003;</button>`}
    </div>
  </div>`;
}

function renderResults(){
  const total=order.length,pct=Math.round((score/total)*100),wrong=total-score;
  return`<div class="results">
    <div class="big-score">${pct}%</div>
    <div class="sub">You scored ${score} out of ${total}</div>
    <div class="time-taken">Time: ${fmt(finalTime)} &nbsp;·&nbsp; ${selCat} &nbsp;·&nbsp; ${selMode==='immediate'?'Immediate feedback':'Reveal at end'}</div>
    <div class="stat-grid">
      <div class="stat"><div class="stat-n" style="color:#2a7a2a">${score}</div><div class="stat-l">Correct</div></div>
      <div class="stat"><div class="stat-n" style="color:#b02020">${wrong}</div><div class="stat-l">Incorrect</div></div>
      <div class="stat"><div class="stat-n">${total}</div><div class="stat-l">Questions</div></div>
    </div>
    <div class="rbtns">
      <button class="btn primary" onclick="restartSame()">Retry</button>
      <button class="btn" onclick="goHome()">Change settings</button>
      <button class="btn" onclick="goReview()">Review answers</button>
    </div>
  </div>`;
}

function renderReview(){
  const total=order.length;
  let html=`<div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap">
      <button class="btn" onclick="screen='results';render()">&#8592; Results</button>
      <span style="font-size:13px;color:#888">${total} questions · ${fmt(finalTime)} · ${score}/${total} correct</span>
    </div>`;
  order.forEach((qi,i)=>{
    const q=filtered[qi],sel=answered[i],ok=sel===q.a;
    const sc=sel===undefined?'#aaa':ok?'#2a7a2a':'#b02020';
    const sl=sel===undefined?'Not answered':ok?'Correct':'Incorrect';
    html+=`<div class="review-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:11px;color:#bbb;text-transform:uppercase;letter-spacing:.5px">${i+1}. ${q.cat}</span>
        <span style="font-size:12px;font-weight:500;color:${sc}">${sl}</span>
      </div>
      <div class="q-text" style="font-size:14px;margin-bottom:10px">${q.q}</div>
      <div class="options">${q.opts.map((o,oi)=>{let c='opt disabled';if(oi===q.a)c+=' correct';else if(oi===sel&&sel!==q.a)c+=' wrong';return`<div class="${c}">${String.fromCharCode(65+oi)}. ${o}</div>`;}).join('')}</div>
      ${sel===undefined?`<div class="feedback wrong">Not answered. Correct: ${q.opts[q.a]}</div>`:ok?`<div class="feedback correct">Correct!</div>`:`<div class="feedback wrong">You chose: ${q.opts[sel]}. Correct: ${q.opts[q.a]}</div>`}
    </div>`;
  });
  html+='</div>';
  return html;
}

render();
</script>
</body>
</html>
