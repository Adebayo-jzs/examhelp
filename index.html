<style>

<script>
const QS=[

// ══════════════════════════════════════════════════════════════
// CATEGORY 1: Creation Theories
// ══════════════════════════════════════════════════════════════
{cat:"Creation Theories",q:"Which creation theory states that God created the universe in six days and rested on the seventh?",opts:["Creatina","Gap theory","Progressive creation","Theistic evolution"],a:0},
{cat:"Creation Theories",q:"Which theory includes a \"gap\" period between creation events?",opts:["Creatina","Gap theory","Deistic evolution","Pantheistic evolution"],a:1},
{cat:"Creation Theories",q:"Which theory proposes that God created different life forms at successive times over a long period?",opts:["Creatina","Progressive creation","Theistic evolution","Evolution (natural evolution)"],a:1},
{cat:"Creation Theories",q:"Which theory asserts that although evolution occurs, God continuously controls the process?",opts:["Theistic evolution","Deistic evolution","Progressive creation","Gap theory"],a:0},
{cat:"Creation Theories",q:"Which theory suggests that the Earth and life evolved by natural processes until God \"took charge\"?",opts:["Creatina","Deistic evolution","Progressive creation","Pantheistic evolution"],a:1},
{cat:"Creation Theories",q:"Which view holds that God is identical with the evolving universe?",opts:["Creatina","Theistic evolution","Pantheistic evolution","Gap theory"],a:2},
{cat:"Creation Theories",q:"Which perspective argues that life and the universe have evolved solely by natural processes over billions of years?",opts:["Creatina","Progressive creation","Theistic evolution","Evolution"],a:3},
{cat:"Creation Theories",q:"Which creation theory implies there was a gap period between acts of creation?",opts:["Creatina","Gap theory","Progressive creation","Deistic evolution"],a:1},
{cat:"Creation Theories",q:"Which theory accepts a long evolutionary process for earth and life while maintaining that God is in control?",opts:["Gap theory","Creatina","Theistic evolution","Evolution"],a:2},
{cat:"Creation Theories",q:"Which theory posits that God himself evolved along with the universe and that life arose from extra-terrestrial organisms?",opts:["Theistic evolution","Deistic evolution","Pantheistic evolution","Progressive creation"],a:2},
{cat:"Creation Theories",q:"Which theory holds God created successively at different times during the long age of the earth and life?",opts:["Gap theory","Creatina","Progressive creation","Deistic evolution"],a:2},
{cat:"Creation Theories",q:"Which viewpoint favors natural processes without further divine intervention after creation?",opts:["Theistic evolution","Progressive creation","Pantheistic evolution","Evolution"],a:3},
{cat:"Creation Theories",q:"Which theory proposes that God created in six days, then after a gap period resumed creation?",opts:["Creatina","Theistic evolution","Gap theory","Pantheistic evolution"],a:2},
{cat:"Creation Theories",q:"Which creation theory is consistent with long ages for the earth and life and involves periodic divine intervention?",opts:["Gap theory","Progressive creation","Creatina","Deistic evolution"],a:1},
{cat:"Creation Theories",q:"What is the term for the view that life and the universe evolved over thousands and billions of years solely by natural processes?",opts:["Progressive creation","Gap theory","Theistic evolution","Evolution"],a:3},

// ══════════════════════════════════════════════════════════════
// CATEGORY 2: Darwin & Natural Selection
// ══════════════════════════════════════════════════════════════
{cat:"Darwin & Natural Selection",q:"On which ship did Charles Darwin make observations that influenced his theory of evolution?",opts:["HMS Victory","HMS Beagle","HMS Endeavour","HMS Explorer"],a:1},
{cat:"Darwin & Natural Selection",q:"In which island group did Darwin observe finch variations that later supported his ideas on natural selection?",opts:["Hawaiian Islands","Galapagos Islands","Canary Islands","Fiji Islands"],a:1},
{cat:"Darwin & Natural Selection",q:"What is the key mechanism of evolution proposed by Darwin?",opts:["Genetic drift","Natural selection","Mutation only","Divine intervention"],a:1},
{cat:"Darwin & Natural Selection",q:"Who is primarily credited with the development of the theory of natural selection?",opts:["Lamarck","Darwin","Wallace","Mendel"],a:1},
{cat:"Darwin & Natural Selection",q:"Which scientist independently arrived at conclusions similar to Darwin's regarding natural selection?",opts:["Lamarck","Alfred Russel Wallace","Gregor Mendel","Thomas Huxley"],a:1},
{cat:"Darwin & Natural Selection",q:"What is the title of Darwin's famous book that outlines his theory of natural selection?",opts:["The Descent of Man","On the Origin of Species","The Voyage of the Beagle","The Expression of Emotions"],a:1},
{cat:"Darwin & Natural Selection",q:"In what year did Darwin present his essay on evolution to the Linnean Society of London?",opts:["1848","1858","1868","1878"],a:1},
{cat:"Darwin & Natural Selection",q:"What term describes the phenomenon where organisms produce more offspring than can survive, leading to a struggle for existence?",opts:["Natural selection","Overproduction / Struggle for survival","Genetic drift","Adaptation"],a:1},
{cat:"Darwin & Natural Selection",q:"How did Darwin's study of domesticated animals contribute to his theory?",opts:["It showed that all animals are genetically identical","It demonstrated that selective breeding can produce significant variation","It proved that natural selection does not operate in nature","It indicated that only wild animals evolve"],a:1},
{cat:"Darwin & Natural Selection",q:"Darwin's main contribution to biology was to explain:",opts:["That species are fixed since creation","How species evolve through natural selection","That evolution is impossible without divine intervention","That inheritance does not affect evolution"],a:1},
{cat:"Darwin & Natural Selection",q:"Which observation by Darwin helped him formulate his theory of natural selection?",opts:["Uniformity of species across continents","Variation in species correlated with geographic distribution","The immediate creation of species","A lack of variation in domesticated animals"],a:1},
{cat:"Darwin & Natural Selection",q:"Natural selection acts on populations by:",opts:["Randomly altering all individuals","Favoring individuals with traits that improve fitness","Eliminating genetic diversity entirely","Forcing immediate large-scale changes"],a:1},
{cat:"Darwin & Natural Selection",q:"Natural selection is considered non-random because it:",opts:["Acts independently of environmental conditions","Consistently favors traits that confer survival advantages","Randomly eliminates individuals regardless of traits","Operates without any selective pressures"],a:1},
{cat:"Darwin & Natural Selection",q:"Darwin's theory of evolution challenged the view that species are:",opts:["Mutable","Fixed and unchanging","Diverse","Adaptable"],a:1},
{cat:"Darwin & Natural Selection",q:"What major controversy did Darwin's theory help resolve?",opts:["Whether the Earth is flat","The debate between fixity of species and change in species","The speed of light in a vacuum","The chemical composition of water"],a:1},
{cat:"Darwin & Natural Selection",q:"Which biblical passage is most often cited in debates over creation versus evolution?",opts:["Genesis 1:1","Genesis 1:11–12","Exodus 20","Psalms 23"],a:1},
{cat:"Darwin & Natural Selection",q:"What misconception did some theologians have regarding species prior to Darwin's work?",opts:["Species change continuously over time","Species were fixed and unchanging","Species are the result of natural selection","Species are created through hybridization"],a:1},
{cat:"Darwin & Natural Selection",q:"Darwin's concept of gradualism implies that evolutionary change occurs:",opts:["Suddenly in large leaps","Slowly and incrementally over long periods","Only in response to catastrophic events","Instantly in one generation"],a:1},
{cat:"Darwin & Natural Selection",q:"The \"Darwin finches\" are significant because they:",opts:["Prove that all birds are identical","Illustrate how different environments can lead to variations in beak shape","Disprove the concept of adaptation","Were not influenced by natural selection"],a:1},
{cat:"Darwin & Natural Selection",q:"What does \"the struggle for existence\" imply in evolutionary theory?",opts:["Unlimited resources for every organism","Competition among individuals for limited resources","That all individuals survive equally well","That evolution is instantaneous"],a:1},
{cat:"Darwin & Natural Selection",q:"In evolutionary terms, \"fitness\" is best defined as an organism's ability to:",opts:["Run fast and be strong","Survive and reproduce in its environment","Avoid any genetic mutations","Remain unchanged over time"],a:1},
{cat:"Darwin & Natural Selection",q:"Continuous change in populations over generations demonstrates that natural selection is:",opts:["A one-time event","An ongoing process","Only observable in fossils","Unrelated to environmental factors"],a:1},
{cat:"Darwin & Natural Selection",q:"The evolutionary process is best summarized as:",opts:["Random change with no direction","Change through natural selection acting on genetic variation","A completely predetermined process","A phenomenon that contradicts the fossil record"],a:1},
{cat:"Darwin & Natural Selection",q:"Darwin's voyage on the HMS Beagle is significant because it:",opts:["Showed that all species are identical worldwide","Provided evidence of variation and adaptation in different environments","Confirmed that species do not change","Focused solely on marine organisms"],a:1},
{cat:"Darwin & Natural Selection",q:"Which statement best describes the pace of evolution?",opts:["Evolution occurs suddenly in one generation","Evolution is a slow, gradual process over many generations","Evolution happens only during catastrophic events","Evolution is instantaneous once a species is formed"],a:1},

// ══════════════════════════════════════════════════════════════
// CATEGORY 3: Micro & Macroevolution
// ══════════════════════════════════════════════════════════════
{cat:"Micro & Macroevolution",q:"What does the term \"microevolution\" refer to?",opts:["Large-scale transformation of major groups","Small changes within a species over time","The origin of life","Sudden extinction events"],a:1},
{cat:"Micro & Macroevolution",q:"What does \"macroevolution\" refer to?",opts:["Minor genetic variations within a species","Formation of new subspecies only","Major changes that transform one group into another","Temporary adaptations"],a:2},
{cat:"Micro & Macroevolution",q:"What is the term for small evolutionary changes within a population that can lead to the formation of new species?",opts:["Macroevolution","Microevolution","Speciation","Genetic drift"],a:1},
{cat:"Micro & Macroevolution",q:"What term describes large-scale evolutionary changes that can transform one major group of organisms into another?",opts:["Microevolution","Speciation","Macroevolution","Adaptation"],a:2},
{cat:"Micro & Macroevolution",q:"Which process involves the geographic separation of populations that can lead to speciation?",opts:["Natural selection","Geographic isolation","Genetic recombination","Reproductive isolation"],a:1},
{cat:"Micro & Macroevolution",q:"What term describes differences that develop to prevent interbreeding between separated populations?",opts:["Genetic drift","Adaptation","Reproductive isolation","Microevolution"],a:2},
{cat:"Micro & Macroevolution",q:"Which hybrid, resulting from the cross between a horse and a donkey, is an example of reproductive isolation?",opts:["Liger","Mule","Hinny","Hybrid"],a:1},
{cat:"Micro & Macroevolution",q:"What is speciation?",opts:["The extinction of a species","The process by which new species develop","The hybridization of two species","A form of microevolution only"],a:1},
{cat:"Micro & Macroevolution",q:"Which best describes the difference between microevolution and macroevolution?",opts:["Microevolution is small-scale change; macroevolution involves major transitions","Microevolution leads to extinction; macroevolution does not","Microevolution occurs only in animals; macroevolution only in plants","There is no difference between them"],a:0},
{cat:"Micro & Macroevolution",q:"Geographic isolation can lead to speciation because it:",opts:["Eliminates genetic variation","Separates populations so they evolve independently","Forces all individuals to remain identical","Prevents any change in traits"],a:1},
{cat:"Micro & Macroevolution",q:"How can adaptation to different environments lead to speciation?",opts:["It reduces variation in a population","It causes different populations to develop unique traits over time","It makes all populations identical","It only affects physical appearance temporarily"],a:1},
{cat:"Micro & Macroevolution",q:"How are microevolution and macroevolution related?",opts:["They are completely independent processes","Microevolutionary changes over long periods can lead to macroevolution","Only microevolution occurs in nature","Macroevolution contradicts microevolution"],a:1},
{cat:"Micro & Macroevolution",q:"Which example best illustrates reproductive isolation?",opts:["Two bird populations interbreeding freely","A sterile mule resulting from a horse–donkey cross","Variations in beak shape among finches","Seasonal changes in a species' behavior"],a:1},
{cat:"Micro & Macroevolution",q:"What role do mutations play in evolution?",opts:["They decrease genetic diversity","They introduce genetic variation","They prevent speciation","They only affect non-heritable traits"],a:1},
{cat:"Micro & Macroevolution",q:"How does genetic recombination affect evolution?",opts:["It reduces genetic diversity","It creates new gene combinations that contribute to variation","It eliminates mutations entirely","It ensures all offspring are identical"],a:1},
{cat:"Micro & Macroevolution",q:"Which process is central to the formation of new species through isolation?",opts:["Natural selection","Speciation","Hybridization","Genetic drift"],a:1},
{cat:"Micro & Macroevolution",q:"One common criticism of macroevolution is that it:",opts:["Cannot account for minor genetic changes","Implies extremely large transformations that some find hard to explain","Disregards the fossil record entirely","Is based solely on divine intervention"],a:1},
{cat:"Micro & Macroevolution",q:"What evolutionary process results in new strains, races, forms, or varieties within a species?",opts:["Macroevolution","Speciation via microevolution","Extinction","Geographic isolation only"],a:1},
{cat:"Micro & Macroevolution",q:"Which of the following is a recognized mechanism of evolution?",opts:["Instantaneous divine creation","Fixity of species","Natural selection","Complete stasis"],a:2},
{cat:"Micro & Macroevolution",q:"Adaptive radiation occurs when:",opts:["One species diversifies into multiple forms to exploit different niches","All species converge to a single form","Environmental pressures force a species into extinction","No changes occur despite environmental challenges"],a:0},

// ══════════════════════════════════════════════════════════════
// CATEGORY 4: Fossil Record & Evidence for Evolution
// ══════════════════════════════════════════════════════════════
{cat:"Fossil Record & Evidence",q:"What does the geological column represent?",opts:["A record of chemical compositions in rocks","Rock layers arranged from oldest to youngest","The distribution of fossils by type only","A diagram of tectonic plates"],a:1},
{cat:"Fossil Record & Evidence",q:"According to the principle of superposition, which rock layer is the oldest?",opts:["The top layer","The bottom layer","The middle layer","All layers are the same age"],a:1},
{cat:"Fossil Record & Evidence",q:"What is the term for the sudden appearance of many multicellular phyla in the Lower Cambrian?",opts:["Cambrian gap","Cambrian explosion","Cambrian era","Cambrian stasis"],a:1},
{cat:"Fossil Record & Evidence",q:"In which type of rock are fossils most commonly found?",opts:["Igneous","Metamorphic","Sedimentary","Volcanic"],a:2},
{cat:"Fossil Record & Evidence",q:"What are fossils?",opts:["Only bones of extinct animals","Preserved remains or imprints of once-living organisms","Rocks shaped like living things","Chemical traces left by organisms"],a:1},
{cat:"Fossil Record & Evidence",q:"Approximately how many fossil species have scientists described?",opts:["Over 25,000","Over 100,000","Over 250,000","Over 1 million"],a:2},
{cat:"Fossil Record & Evidence",q:"What is the scientific study of fossils called?",opts:["Geology","Paleontology","Stratigraphy","Biostratigraphy"],a:1},
{cat:"Fossil Record & Evidence",q:"What is permineralization?",opts:["A process where organisms are frozen","A fossilization process where minerals infiltrate and preserve the structure of organic tissues","A process creating carbon films","Preservation in tree resin"],a:1},
{cat:"Fossil Record & Evidence",q:"Which fossilization process involves preservation in tree resin?",opts:["Carbonization","Permineralization","Amber preservation","Freezing"],a:2},
{cat:"Fossil Record & Evidence",q:"What type of fossil provides evidence of an organism's activity or behavior?",opts:["Body fossil","Trace fossil","Index fossil","Transitional fossil"],a:1},
{cat:"Fossil Record & Evidence",q:"What are transitional fossils?",opts:["Fossils that perfectly match modern species","Fossils that show intermediate forms between ancestral and descendant species","Fossils found only in one location","Fossils that disprove evolution"],a:1},
{cat:"Fossil Record & Evidence",q:"Which of the following is considered transitional evidence for evolution?",opts:["Vestigial organs","Transitional fossils","Tree rings","Ice core layers"],a:1},
{cat:"Fossil Record & Evidence",q:"A transitional fossil is characterized by having:",opts:["Only features of modern species","A mix of ancestral and derived traits","No identifiable characteristics","Features that disprove evolution"],a:1},
{cat:"Fossil Record & Evidence",q:"The fossil record supports evolution by showing:",opts:["A completely random assortment of species","A sequence of forms from simple to complex over time","No clear patterns in the appearance of organisms","Only modern species with no transitions"],a:1},
{cat:"Fossil Record & Evidence",q:"Why is rapid burial important in the fossilization process?",opts:["It speeds up mineralization","It prevents oxygen from decomposing the remains and protects them from scavengers","It creates trace fossils","It increases the chance of amber formation"],a:1},
{cat:"Fossil Record & Evidence",q:"Why are fossils rarely found in igneous or metamorphic rocks?",opts:["These rocks are too rare","The processes forming these rocks do not favor the preservation of organic remains","Fossils dissolve in high heat","These rocks are always underwater"],a:1},
{cat:"Fossil Record & Evidence",q:"Homologous structures are evidence for evolution because they indicate:",opts:["Independent creation of species","Common ancestry among different organisms","That species have no relation to each other","Random distribution of traits"],a:1},
{cat:"Fossil Record & Evidence",q:"Studies in embryology support evolutionary theory by demonstrating that:",opts:["Embryos of different species often show similar early stages","Every species' embryonic development is completely unique","Embryology disproves common ancestry","Embryos develop without any genetic influence"],a:0},
{cat:"Fossil Record & Evidence",q:"Which of the following is NOT typically used as evidence for evolution?",opts:["Embryological similarities","Homologous structures","Fossil records","Meteorite composition"],a:3},
{cat:"Fossil Record & Evidence",q:"What does the arrangement of the geological column indicate about the complexity of life?",opts:["Complexity decreases over time","Simpler organisms appear in older layers, while more complex organisms appear in younger layers","All layers contain the same organisms","Complexity is randomly distributed"],a:1},
{cat:"Fossil Record & Evidence",q:"What are the two major layers of the geological column?",opts:["Paleozoic and Mesozoic","Precambrian and Phanerozoic","Cambrian and Ordovician","Triassic and Jurassic"],a:1},
{cat:"Fossil Record & Evidence",q:"The existence of many transitional fossils supports which concept?",opts:["Special creation","Gradual evolution","The immutability of species","Random appearance of modern forms"],a:1},
{cat:"Fossil Record & Evidence",q:"One reason the fossil record is incomplete is that:",opts:["Fossilization is a very common process for all organisms","Only a small fraction of organisms are preserved as fossils","All fossils are always perfectly preserved","Geological processes do not affect fossil preservation"],a:1},
{cat:"Fossil Record & Evidence",q:"The idea of \"common descent\" implies that:",opts:["Every species was created independently","All organisms share an ancestral origin","Species are completely unrelated","Evolution is solely a random process"],a:1},
{cat:"Fossil Record & Evidence",q:"\"Descent with modification\" is best exemplified by:",opts:["The sudden creation of species","The gradual accumulation of changes leading to new forms","The complete stasis of species over time","The direct intervention of a creator at each step"],a:1},

{cat:"Fossil Record & Evidence",q:"Vestigial structures in organisms are best explained by:",opts:["Complete design perfection","Remnants of organs that were functional in ancestral species","Structures acquired during an organism's lifetime","Features that serve no purpose at all"],a:1},
{cat:"Fossil Record & Evidence",q:"Which primary line of evidence supports evolution by showing a continuous sequence from simple to complex forms?",opts:["The fossil record","Tree-ring analysis","Meteorological data","Ocean current patterns"],a:0},
{cat:"Fossil Record & Evidence",q:"What overarching concept unifies evidence from the geological column, fossil records, and embryology?",opts:["Creationism","The theory of evolution","Progressive creation","Theistic evolution"],a:1},
{cat:"Fossil Record & Evidence",q:"Which type of fossil provides insight into the behavior or movement of an organism?",opts:["Body fossils","Index fossils","Trace fossils","Transitional fossils"],a:2},

// ══════════════════════════════════════════════════════════════
// CATEGORY 5: Scientific Dating — Overview & Relative Methods
// ══════════════════════════════════════════════════════════════
{cat:"Scientific Dating: Overview",q:"What is the primary goal of scientific dating?",opts:["To measure the density of materials","To determine the age of organic and inorganic materials","To analyze the chemical composition of rocks","To locate archaeological sites"],a:1},
{cat:"Scientific Dating: Overview",q:"Scientific dating is commonly used in which of the following fields?",opts:["Archaeology","Geology","Paleontology","All of the above"],a:3},
{cat:"Scientific Dating: Overview",q:"The two major categories of dating methods are:",opts:["Relative dating and chronological dating","Absolute dating and radiometric dating","Relative dating and absolute dating","Stratigraphic dating and fossil dating"],a:2},

{cat:"Scientific Dating: Overview",q:"Absolute dating methods use physical, chemical, or biological changes to provide:",opts:["Only a relative sequence of events","Numerical age estimates","Visual descriptions of rock layers","Estimates of environmental conditions"],a:1},
{cat:"Scientific Dating: Overview",q:"Stratigraphy is the study of:",opts:["Radioactive decay rates","Rock layers or strata","Tree rings","Fossil DNA sequences"],a:1},
{cat:"Scientific Dating: Overview",q:"The principle of superposition in stratigraphy states that:",opts:["Younger layers are always at the bottom","Older layers are at the bottom and younger layers are at the top","All layers have the same age","Rock layers are randomly arranged"],a:1},
{cat:"Scientific Dating: Overview",q:"Biostratigraphy uses which of the following as markers to date rock layers?",opts:["Ice layers","Index fossils (index species)","Mineral content","Radiometric isotopes"],a:1},
{cat:"Scientific Dating: Overview",q:"Lithostratigraphy relies on which characteristics of rock strata?",opts:["Their radioactive decay rates","Their physical characteristics such as composition and texture","Their magnetic properties","Their color patterns only"],a:1},
{cat:"Scientific Dating: Overview",q:"A drawback of relative dating is that it:",opts:["Provides precise numerical ages","Can be affected by geological disturbances such as earthquakes","Requires complex laboratory equipment","Only applies to organic materials"],a:1},
{cat:"Scientific Dating: Overview",q:"Which of the following is an example of a relative dating method?",opts:["Carbon-14 dating","Stratigraphy","Uranium-Lead dating","Potassium-Argon dating"],a:1},
{cat:"Scientific Dating: Overview",q:"Which dating method involves drilling core samples from ice in glaciated regions?",opts:["Stratigraphy","Ice core dating","Dendrochronology","Thermoluminescence dating"],a:1},
{cat:"Scientific Dating: Overview",q:"In ice core dating, the visible dark and light rings generally represent:",opts:["Changes in mineral composition","Annual variations in snowfall or temperature","Fossil accumulation","Volcanic eruptions"],a:1},
{cat:"Scientific Dating: Overview",q:"Geological relationships in relative dating involve:",opts:["Measuring tree-ring widths","Observing cross-cutting (truncating) features across rock layers","Determining the half-life of isotopes","Analyzing the luminescence of minerals"],a:1},
{cat:"Scientific Dating: Overview",q:"Absolute dating methods are considered \"absolute\" because they provide:",opts:["Only the order of events","Specific numerical age estimates","Relative sequences without dates","Estimates of climate change only"],a:1},

{cat:"Scientific Dating: Overview",q:"A common drawback of relative dating methods is that they:",opts:["Provide precise numerical ages","Are unaffected by disturbances","Cannot determine the exact age of events","Rely on radioactive decay"],a:2},

// CATEGORY 6: Radiometric Dating
// ══════════════════════════════════════════════════════════════
{cat:"Radiometric Dating",q:"Radiometric dating is based on the principle of:",opts:["Sediment deposition","Radioactive decay of unstable isotopes","The layering of ice cores","Fossil morphology"],a:1},
{cat:"Radiometric Dating",q:"In radiometric dating, what does \"half-life\" refer to?",opts:["The time required for a rock layer to form","The time it takes for half of a radioactive isotope to decay","The time period between ice core layers","The time it takes for a fossil to become mineralized"],a:1},
{cat:"Radiometric Dating",q:"Carbon-14 dating is primarily used to date:",opts:["Volcanic rocks","Organic materials such as wood, bones, and shells","Zircon crystals","Sedimentary rock layers"],a:1},
{cat:"Radiometric Dating",q:"The approximate half-life of Carbon-14 is:",opts:["1,000 years","5,730 years","10,000 years","50,000 years"],a:1},
{cat:"Radiometric Dating",q:"Uranium-Lead dating is particularly useful for dating:",opts:["Recent organic remains","Ancient rocks and minerals, especially those with zircon crystals","Ice cores","Tree rings"],a:1},
{cat:"Radiometric Dating",q:"In Uranium-Lead dating, uranium decays into which stable element?",opts:["Nitrogen","Lead","Argon","Carbon"],a:1},

{cat:"Radiometric Dating",q:"Radiometric dating accuracy can be compromised by:",opts:["Consistent isotope levels","Contamination with modern materials","A high concentration of radioactive elements","Perfectly sealed rock samples"],a:1},
{cat:"Radiometric Dating",q:"Some rocks are unsuitable for radiometric dating because they:",opts:["Are too colorful","Lack sufficient radioactive elements","Are too porous","Are only found in sedimentary basins"],a:1},
{cat:"Radiometric Dating",q:"Quartz is rarely useful for radiometric dating because:",opts:["It is too hard","It does not accommodate radioactive elements in its crystal structure","It decays too quickly","It is only found in metamorphic rocks"],a:1},
{cat:"Radiometric Dating",q:"In radiometric dating, a \"parent isotope\" decays into a:",opts:["Sibling isotope","Daughter isotope","Precursor isotope","Partner isotope"],a:1},
{cat:"Radiometric Dating",q:"The accuracy of radiometric dating depends on the assumption that:",opts:["Decay rates have remained constant over time","Rock layers are always disturbed","All rocks contain the same minerals","Samples have high moisture content"],a:0},
{cat:"Radiometric Dating",q:"A drawback of Carbon-14 dating is that it is not effective for dating materials older than approximately:",opts:["5,000 years","50,000 years","500,000 years","5 million years"],a:1},
{cat:"Radiometric Dating",q:"Uranium-Lead dating is particularly useful because zircon crystals in rocks:",opts:["Incorporate uranium but exclude lead when formed","Have high concentrations of carbon","Are only found in sedimentary rocks","Decay too rapidly for dating"],a:0},
{cat:"Radiometric Dating",q:"Which of the following is NOT a radiometric dating method?",opts:["Carbon-14 dating","Uranium-Lead dating","Dendrochronology","Potassium-Argon dating"],a:2},
{cat:"Radiometric Dating",q:"The reliability of radiometric dating can be compromised by:",opts:["Consistent environmental conditions","Isotopic contamination","The presence of tree rings","Uniform sedimentation"],a:1},
{cat:"Radiometric Dating",q:"A limitation of radiometric dating is that it assumes a closed system, meaning that:",opts:["The sample must never have been altered by external influences","The rock can exchange isotopes with its environment","The decay rate is irrelevant","The sample has been reheated recently"],a:0},
{cat:"Radiometric Dating",q:"The daughter product of Carbon-14 decay is:",opts:["Oxygen","Carbon-12","Nitrogen-14","Uranium"],a:2},
{cat:"Radiometric Dating",q:"The principle underlying radiometric dating is that radioactive isotopes decay at a:",opts:["Constant and predictable rate","Variable rate depending on temperature","Rate that increases over time","Rate influenced by sediment deposition"],a:0},
{cat:"Radiometric Dating",q:"A problem in radiometric dating arises when the isotopic system becomes \"open,\" meaning that:",opts:["No isotopes are lost or gained","The sample has exchanged isotopes with its environment","The rock is completely isolated","The decay rate is exactly as predicted"],a:1},
{cat:"Radiometric Dating",q:"Potassium-Argon dating is based on the decay of Potassium-40 to which gas?",opts:["Carbon dioxide","Argon-40","Nitrogen-14","Oxygen"],a:1},
{cat:"Radiometric Dating",q:"Carbon-14 is a radioactive isotope of which element?",opts:["Nitrogen","Carbon","Oxygen","Uranium"],a:1},
{cat:"Radiometric Dating",q:"Which dating method relies on the decay of Potassium-40 to Argon-40?",opts:["Carbon-14 dating","Uranium-Lead dating","Potassium-Argon dating","TL dating"],a:2},
{cat:"Radiometric Dating",q:"For dating ancient volcanic materials, which method is most appropriate?",opts:["Carbon-14 dating","Dendrochronology","Potassium-Argon dating","TL dating"],a:2},
{cat:"Radiometric Dating",q:"A major assumption in radiometric dating is related to the sample's initial:",opts:["Color","Isotope concentration","Density","Magnetic field"],a:1},

// ══════════════════════════════════════════════════════════════

{cat:"Non-Radiometric Dating",q:"Thermoluminescence (TL) dating measures the amount of light emitted from a mineral as a result of:",opts:["Radioactive decay","Heating that releases trapped electrons","Magnetic field changes","Chemical reactions with water"],a:1},
{cat:"Non-Radiometric Dating",q:"TL dating is particularly effective for dating which type of materials?",opts:["Organic remains like wood","Ceramic, burnt stone, and minerals such as feldspar","Ice core layers","Fossilized bones"],a:1},
{cat:"Non-Radiometric Dating",q:"A pitfall of TL dating is that if a sample has been reheated and cooled, it may:",opts:["Be dated older than it actually is","Lose trapped electrons and be dated younger than it is","Emit no luminescence","Become ideal for radiometric analysis"],a:1},
{cat:"Non-Radiometric Dating",q:"The accuracy of TL dating is limited because:",opts:["Radiation levels remain perfectly constant","Radiation levels can vary over time","It is not based on electron trapping","It is only used on metallic objects"],a:1},
{cat:"Non-Radiometric Dating",q:"Dendrochronology is also known as:",opts:["Ice core dating","Tree-ring dating","Radiocarbon dating","Potassium-Argon dating"],a:1},
{cat:"Non-Radiometric Dating",q:"Dendrochronology is used to determine the age of:",opts:["Rocks","Trees and wooden objects","Fossilized shells","Ceramic artifacts"],a:1},

{cat:"Non-Radiometric Dating",q:"A limitation of dendrochronology is that it is geographically restricted to regions where:",opts:["Trees have no visible rings","Trees form distinct annual growth rings","Ice cores are abundant","Volcanic activity is high"],a:1},
{cat:"Non-Radiometric Dating",q:"Dendrochronology is most effective in:",opts:["Tropical rainforests","Arid regions with distinct growth rings","Deep ocean sediments","Volcanic regions"],a:1},

{cat:"Non-Radiometric Dating",q:"Dendrochronology can provide insights into past climatic conditions because tree rings reflect:",opts:["Radioactive decay rates","Annual variations in growth influenced by climate","The mineral content of soil","The magnetic field of the Earth"],a:1},
{cat:"Non-Radiometric Dating",q:"Which dating method involves measuring the light emitted from a mineral after heating?",opts:["Carbon-14 dating","Thermoluminescence (TL) dating","Dendrochronology","Uranium-Lead dating"],a:1},

{cat:"Non-Radiometric Dating",q:"A general limitation of TL dating is that its accuracy is roughly within:",opts:["5%","15%","50%","90%"],a:1},
{cat:"Non-Radiometric Dating",q:"TL dating is most accurate when the sample has:",opts:["Never been heated since its last event","Been repeatedly heated","Constant exposure to light","Been mixed with organic material"],a:0},
{cat:"Non-Radiometric Dating",q:"One advantage of dendrochronology is that it provides:",opts:["Numerical dates with annual resolution","Only relative dates","Information on volcanic activity","Radiometric isotope ratios"],a:0},
{cat:"Non-Radiometric Dating",q:"A drawback of non-radiometric dating methods is that they:",opts:["Always yield exact numerical ages","Can be influenced by environmental changes","Are independent of physical changes","Are more precise than radiometric methods"],a:1},
{cat:"Non-Radiometric Dating",q:"Which method is best for dating materials older than 50,000 years?",opts:["Carbon-14 dating","Dendrochronology","Potassium-Argon dating","TL dating"],a:2},
{cat:"Non-Radiometric Dating",q:"In TL dating, the \"clock\" is reset by:",opts:["Exposure to sunlight","Heating that releases trapped electrons","Cooling in a dark environment","Chemical reactions with water"],a:1},
{cat:"Non-Radiometric Dating",q:"Which dating method also yields information about past climate conditions?",opts:["Radiometric dating","Dendrochronology","Potassium-Argon dating","Lithostratigraphy"],a:1},
{cat:"Non-Radiometric Dating",q:"In TL dating, the amount of luminescence is proportional to the:",opts:["Age of the sample","Number of trapped electrons since last heating","Mass of the mineral","Chemical composition only"],a:1},
{cat:"Non-Radiometric Dating",q:"TL dating is particularly sensitive to changes in:",opts:["Ambient temperature during measurement","Environmental radiation levels over time","The sample's magnetic field","The physical size of the sample"],a:1},
{cat:"Non-Radiometric Dating",q:"Wooden artifacts are best dated by using:",opts:["Potassium-Argon dating","Radiocarbon (Carbon-14) dating","Uranium-Lead dating","TL dating"],a:1}

];

const ALL_CATS=["All","Creation Theories","Darwin & Natural Selection","Micro & Macroevolution","Fossil Record & Evidence","Scientific Dating: Overview","Radiometric Dating","Non-Radiometric Dating"];
function countCat(c){return c==="All"?QS.length:QS.filter(q=>q.cat===c).length;}
const COUNTS=Object.fromEntries(ALL_CATS.map(c=>[c,countCat(c)]));

let screen="start",selCat="All",selMode="immediate",selCount=20,customCount="",useCustom=false;
let filtered=[],order=[],idx=0,score=0,answered={},secs=0,timerID=null,finalTime=0;

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function fmt(s){const m=Math.floor(s/60),r=s%60;return m>0?`${m}m ${r}s`:`${r}s`;}
function tickTimer(){secs++;const el=document.getElementById('td');if(el)el.textContent=fmt(secs);}
function startTimer(){clearInterval(timerID);secs=0;timerID=setInterval(tickTimer,1000);}
function stopTimer(){clearInterval(timerID);finalTime=secs;}
function getPool(){return selCat==="All"?[...QS]:QS.filter(q=>q.cat===selCat);}
function getMaxQ(){return getPool().length;}
function getEffectiveCount(){const max=getMaxQ();const n=useCustom?parseInt(customCount)||0:selCount;return Math.min(Math.max(1,n),max);}
function startQuiz(){const pool=getPool();const n=getEffectiveCount();const shuffled=shuffle(pool.map((_,i)=>i)).slice(0,n);filtered=pool;order=shuffled;idx=0;score=0;answered={};screen="quiz";startTimer();render();}
function pick(i){
  if(selMode==='immediate'&&answered[idx]!==undefined)return; // lock after answer in immediate mode
  if(selMode==='end'){
    // allow changing — remove old score contribution if re-answering
    if(answered[idx]!==undefined&&answered[idx]===filtered[order[idx]].a)score--;
    answered[idx]=i;
    if(i===filtered[order[idx]].a)score++;
  } else {
    answered[idx]=i;
    if(i===filtered[order[idx]].a)score++;
  }
  render();
}
function nav(d){idx=Math.max(0,Math.min(order.length-1,idx+d));render();}
function finish(){stopTimer();screen="results";render();}
function goHome(){stopTimer();screen="start";render();}
function goReview(){screen="review";render();}
function restartSame(){startQuiz();}
function selCatFn(c){selCat=c;useCustom=false;render();}
function selModeFn(m){selMode=m;render();}
function selCountFn(n){selCount=n;useCustom=false;render();}
function onCustomInput(v){customCount=v;useCustom=v.trim()!=="";render();}

function render(){
  document.getElementById('app').innerHTML={start:renderStart,quiz:renderQuiz,results:renderResults,review:renderReview}[screen]();
  if(screen==="start"){const inp=document.getElementById('custom-input');if(inp){inp.value=customCount;inp.addEventListener('input',e=>onCustomInput(e.target.value));}}
}

function renderStart(){
  const max=getMaxQ(),effective=getEffectiveCount();
  return`<div>
    <div class="brand">MCQs · Origins of Science</div>
    <h1>Origins of Science Quiz</h1> 
    <div class="section-label">Select category</div>
    <div class="cat-grid">${ALL_CATS.map(c=>`<div class="cat-card${selCat===c?' selected':''}" onclick="selCatFn('${c.replace(/'/g,"\\'")}')"><div class="cn">${c}</div><div class="cc">${COUNTS[c]} questions</div></div>`).join('')}</div>
    <div class="section-label">Number of questions</div>
    <div class="qcount-row">
      <button class="qcount-btn${!useCustom&&selCount===max?' selected':''}" onclick="selCountFn(${max})">All (${max})</button>
      <div class="qcount-custom">
        <input id="custom-input" type="number" min="1" max="${max}" placeholder="0" class="${useCustom?'selected-input':''}">
        <span class="qcount-max">max ${max}</span>
      </div>
    </div>
      <div class="section-label">Answer mode</div>
    <div class="mode-grid">
      <div class="mode-card${selMode==='immediate'?' selected':''}" onclick="selModeFn('immediate')"><div class="mn">Immediate feedback</div><div class="md">See if you're right after each question</div></div>
      <div class="mode-card${selMode==='end'?' selected':''}" onclick="selModeFn('end')"><div class="mn">Reveal at the end</div><div class="md">All answers shown on the results screen</div></div>
    </div>
    <button class="start-btn" onclick="startQuiz()">Start ${effective} question${effective!==1?'s':''} &#8594;</button>
  </div>`;
}

function renderQuiz(){
  const q=filtered[order[idx]],total=order.length,done=Object.keys(answered).length,pct=Math.round((done/total)*100),sel=answered[idx],isAns=sel!==undefined;
  const opts=q.opts.map((o,i)=>{
    let cls='opt';
    const lockEnd=selMode==='end'?false:isAns; // in end mode, never lock
    if(selMode==='immediate'&&isAns){
      cls+=' disabled';
      if(i===q.a)cls+=' correct';
      else if(i===sel&&sel!==q.a)cls+=' wrong';
    } else if(selMode==='end'&&isAns){
      if(i===sel)cls+=' pending'; // highlight selected but keep clickable
    }
    const clickable=(selMode==='end')||(selMode==='immediate'&&!isAns);
    return`<button class="${cls}"${clickable?` onclick="pick(${i})"`:''} >${String.fromCharCode(65+i)}. ${o}</button>`;
  }).join('');
  let fb='';
  if(isAns&&selMode==='immediate')fb=`<div class="feedback ${sel===q.a?'correct':'wrong'}">${sel===q.a?'Correct!':'Incorrect — correct answer: '+q.opts[q.a]}</div>`;
  else if(isAns&&selMode==='end')fb=`<div class="feedback pending"></div>`;
  return`<div>
    <div class="quiz-header">
      <div class="timer"><span class="tdot"></span><span id="td">${fmt(secs)}</span></div>
      <span class="score-badge">${selMode==='immediate'?score+'/'+done+' correct':'Q '+(idx+1)+' of '+total}</span>
    </div>
    <div class="meta-bar">Q${idx+1} of ${total} &nbsp;·&nbsp; ${q.cat} &nbsp;·&nbsp; ${selMode==='immediate'?'Immediate feedback':'Reveal at end'}</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="question-card">
      <div class="q-cat">${q.cat}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${opts}</div>${fb}
    </div>
    <div class="nav-row">
      <button class="btn" onclick="nav(-1)"${idx===0?' disabled':''}>&#8592; Prev</button>
      <button class="btn ghost" onclick="goHome()">&#215; Quit</button>
      ${idx<total-1?`<button class="btn primary" onclick="nav(1)"${!isAns?' disabled':''}>Next &#8594;</button>`:`<button class="btn primary" onclick="finish()"${!isAns?' disabled':''}>Finish &#10003;</button>`}
    </div>
  </div>`;
}

function renderResults(){
  const total=order.length,pct=Math.round((score/total)*100),wrong=total-score;
  return`<div class="results">
    <div class="big-score">${pct}%</div>
    <div class="sub">You scored ${score} out of ${total}</div>
    <div class="time-taken">Time: ${fmt(finalTime)} &nbsp;·&nbsp; ${selCat} &nbsp;·&nbsp; ${selMode==='immediate'?'Immediate feedback':'Reveal at end'}</div>
    <div class="stat-grid">
      <div class="stat"><div class="stat-n" style="color:#2a7a2a">${score}</div><div class="stat-l">Correct</div></div>
      <div class="stat"><div class="stat-n" style="color:#b02020">${wrong}</div><div class="stat-l">Incorrect</div></div>
      <div class="stat"><div class="stat-n">${total}</div><div class="stat-l">Questions</div></div>
    </div>
    <div class="rbtns">
      <button class="btn primary" onclick="restartSame()">Retry</button>
      <button class="btn" onclick="goHome()">Change settings</button>
      <button class="btn" onclick="goReview()">Review answers</button>
    </div>
  </div>`;
}

function renderReview(){
  const total=order.length;
  let html=`<div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap">
      <button class="btn" onclick="screen='results';render()">&#8592; Results</button>
      <span style="font-size:13px;color:#888">${total} questions · ${fmt(finalTime)} · ${score}/${total} correct</span>
    </div>`;
  order.forEach((qi,i)=>{
    const q=filtered[qi],sel=answered[i],ok=sel===q.a;
    const sc=sel===undefined?'#aaa':ok?'#2a7a2a':'#b02020';
    const sl=sel===undefined?'Not answered':ok?'Correct':'Incorrect';
    html+=`<div class="review-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:11px;color:#bbb;text-transform:uppercase;letter-spacing:.5px">${i+1}. ${q.cat}</span>
        <span style="font-size:12px;font-weight:500;color:${sc}">${sl}</span>
      </div>
      <div class="q-text" style="font-size:14px;margin-bottom:10px">${q.q}</div>
      <div class="options">${q.opts.map((o,oi)=>{let c='opt disabled';if(oi===q.a)c+=' correct';else if(oi===sel&&sel!==q.a)c+=' wrong';return`<div class="${c}">${String.fromCharCode(65+oi)}. ${o}</div>`;}).join('')}</div>
      ${sel===undefined?`<div class="feedback wrong">Not answered. Correct: ${q.opts[q.a]}</div>`:ok?`<div class="feedback correct">Correct!</div>`:`<div class="feedback wrong">You chose: ${q.opts[sel]}. Correct: ${q.opts[q.a]}</div>`}
    </div>`;
  });
  html+='</div>';
  return html;
}

render();
</script>
</body>
</html>
